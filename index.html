  <script>
    const vcard = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'N:Carson;Melissa;Lee;;',
      'FN:Melissa Lee Carson',
      'TITLE:Real Estate Agent',
      'ORG:Stellar Realty NW;Mountain Sky Team',
      'TEL;TYPE=CELL:+15417490139',
      'EMAIL:melissa@melissacarson.realtor',
      'ADR;TYPE=WORK:;;109 NW Greenwood Ave. #105;Bend;OR;97703;US',
      'URL:https://www.mountainskyteam.com',
      'END:VCARD'
    ].join('\n');

    const saveContact = document.querySelector('.save-contact');
    const blob = new Blob([vcard], { type: 'text/vcard' });
    saveContact.href = URL.createObjectURL(blob);

    const menuToggle = document.querySelector('.action-menu-toggle');
    const cardMenu = document.querySelector('.action-menu');
    const qrOverlay = document.querySelector('#qrOverlay');
    const openQrButton = document.querySelector('[data-open-qr]');
    const closeQrButton = document.querySelector('[data-close-qr]');

    function setMenuOpen(isOpen) {
      cardMenu.hidden = !isOpen;
      menuToggle.setAttribute('aria-expanded', String(isOpen));
    }

    function openQrOverlay() {
      setMenuOpen(false);
      qrOverlay.hidden = false;
      document.body.classList.add('qr-open');
      closeQrButton.focus();
    }

    function closeQrOverlay() {
      qrOverlay.hidden = true;
      document.body.classList.remove('qr-open');
      menuToggle.focus();
    }

    menuToggle.addEventListener('click', (event) => {
      event.stopPropagation();
      setMenuOpen(cardMenu.hidden);
    });

    openQrButton.addEventListener('click', openQrOverlay);
    closeQrButton.addEventListener('click', closeQrOverlay);
    qrOverlay.addEventListener('click', (event) => {
      if (event.target === qrOverlay) closeQrOverlay();
    });

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.card-actions')) setMenuOpen(false);
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        if (!qrOverlay.hidden) closeQrOverlay();
        setMenuOpen(false);
      }
    });
  </script>
