<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Melissa Carson – Realtor at Stellar Realty NW" />
  <title>Melissa Carson | Realtor – Stellar Realty NW</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== CARD ===== -->
  <main class="card-wrapper">
    <div class="card">

      <!-- Headshot -->
      <div class="headshot-wrap">
        <img
          src="images/melissa-headshot-1.jpg"
          alt="Melissa Carson headshot"
          class="headshot"
          onerror="this.style.background='#c8b89a'; this.src=''; this.alt='MC';"
        />
      </div>

      <!-- Name & Title -->
      <div class="identity">
        <h1 class="name">Melissa Carson</h1>
        <p class="title">REALTOR®</p>
      </div>

      <!-- Brokerage Logo -->
      <div class="logo-wrap">
        <img src="images/Stellar Logo Black.png" alt="Stellar Realty NW" class="logo logo-brokerage" />
      </div>

      <!-- Divider -->
      <hr class="divider" />

      <!-- Contact Info -->
      <div class="contact-block">
        <a href="tel:+15417490139" class="contact-row">
          <span class="icon">📞</span>
          <span>(541) 749-0139</span>
        </a>
        <a href="sms:+15417490139" class="contact-row">
          <span class="icon">💬</span>
          <span>Text Me</span>
        </a>
        <a href="mailto:melissa@melissacarson.realtor" class="contact-row">
          <span class="icon">✉️</span>
          <span>melissa@melissacarson.realtor</span>
        </a>
      </div>

      <!-- Divider -->
      <hr class="divider" />

      <!-- Links -->
      <div class="links-block">
        <a href="https://www.mountainskyteam.com" target="_blank" rel="noopener" class="site-link">
          mountainskyteam.com
        </a>
        <a href="https://www.stellarrealtynw.com" target="_blank" rel="noopener" class="site-link">
          stellarrealtynw.com
        </a>
      </div>

      <!-- Team Logo -->
      <div class="logo-wrap logo-wrap--team">
        <img src="images/MST - 1.png" alt="Mountain Sky Team" class="logo logo-team" />
      </div>

    </div>
  </main>

  <!-- ===== STICKY ACTION BAR ===== -->
  <div class="sticky-bar">
    <a href="tel:+15417490139" class="sticky-btn sticky-btn--call">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
      Call
    </a>
    <a href="sms:+15417490139" class="sticky-btn sticky-btn--text">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      Text
    </a>
    <a href="mailto:melissa@melissacarson.realtor" class="sticky-btn sticky-btn--email">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      Email
    </a>
  </div>

</body>
</html>
