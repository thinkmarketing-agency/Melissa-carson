          <span>melissa@melissacarson.realtor</span>
        </a>
        <a href="https://maps.google.com/?q=109+NW+Greenwood+Ave+%23105+Bend+OR+97703" target="_blank" rel="noopener" class="contact-row">
          <span class="contact-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 2c4 0 7 3 7 7 0 5.2-7 13-7 13S5 14.2 5 9c0-4 3-7 7-7zm0 9.8A2.8 2.8 0 1 0 12 6a2.8 2.8 0 0 0 0 5.8z"/></svg></span>
          <span>109 NW Greenwood Ave. #105,<br>Bend, OR 97703</span>
        </a>

      <p class="service-line">Serving Bend & Central Oregon</p>

      <div class="fullscreen-phone-brand-row" aria-label="Brokerage and team logos">
        <div class="stellar-lockup">
          <img src="../images/stellar-icon-transparent.png" alt="" class="stellar-icon" />
          <img src="../images/Stellar Logo Black.png" alt="Stellar Realty NW" class="stellar-logo" />

        <img src="../images/mountain-sky-team-transparent.png" alt="Mountain Sky Team" class="team-logo" />

    </section>

    <section class="fullscreen-qr-panel" aria-label="QR code to view Melissa Lee Carson digital card">
      <p class="qr-kicker">Share the Card</p>
      <h2>Scan to View My Card</h2>
      <div class="fullscreen-qr-frame">
        <img src="../images/melissa-qr-transparent.png" alt="QR code for Melissa Lee Carson digital card" class="qr-code" />
      </div>
    </section>
  </main>

  <div class="fullscreen-controls">
    <a href="../" class="fullscreen-control">Back to Card</a>
    <button class="fullscreen-control" type="button" data-enter-fullscreen>Enter Fullscreen</button>
  </div>

  <script>
    const fullscreenButton = document.querySelector('[data-enter-fullscreen]');

    function updateFullscreenButton() {
      fullscreenButton.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Enter Fullscreen';
    }

    fullscreenButton.addEventListener('click', async () => {
      try {
        if (document.fullscreenElement) {
          await document.exitFullscreen();
        } else {
          await document.documentElement.requestFullscreen();
        }
      } catch (error) {
        fullscreenButton.textContent = 'Fullscreen Unavailable';
        window.setTimeout(updateFullscreenButton, 1800);
      }
    });

    document.addEventListener('fullscreenchange', updateFullscreenButton);
  </script>
</body>
</html>
